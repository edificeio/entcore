<div ng-if="canRenderUi">
    <div class="row justify-content-center">
        <div class="col-md-9 col-sm-12">
            <div ng-if="ctrl.status!=='ko' && ctrl.status!=='ok'" class="mb-12 text-center">
                <img class="mx-auto" src="/auth/public/img/validate-mfa-ok.svg" height="200" width="200"></img>
            </div>

            <div ng-if="ctrl.status==='ko'" class="mb-12 text-center">
                <img class="mx-auto" src="/auth/public/img/validate-mfa-nok.svg" height="200" width="200"></img>
            </div>

            <div ng-if="ctrl.status==='ok'" class="mb-12 text-center">
                <img class="mx-auto" src="/auth/public/img/validate-mfa-done.svg" height="200" width="200"></img>
            </div>

            <div class="text-center">
                <h2 class="fw-bold">
                    <i18n>validate-mfa.step1.title</i18n>
                </h2>
            </div>
        </div>
    </div>

    <div class="my-12">
        <div class="row justify-content-center">
            <div class="col-md-9 col-sm-12">
                <div class="mb-16 text-center">
                    <div ng-if="!ctrl.isTotp">
                        <div>
                            <i18n>validate-mfa.step2.hint.paragraph1</i18n>
                            <span> [[ctrl.mobile]].</span>
                        </div>
                        <div>
                            <i18n>validate-mfa.step2.hint.paragraph2</i18n>
                        </div>
                    </div>
                    <div ng-if="ctrl.isTotp">
                        <i18n>validate-mfa.step2.totp.hint</i18n>
                    </div>
                </div>

                <!-- Formulaire de validation du code MFA -->
                <div class="text-center">
                    <form novalidate autocomplete="off" name="formCodeMfa" class="col-sm-6 form-control-lg mx-auto" ng-submit="">
                        <label class="mb-8 fw-bold text-center d-block">
                            <i18n ng-if="!ctrl.isTotp">validate-mfa.step2.form.code</i18n>
                            <i18n ng-if="ctrl.isTotp">validate-mfa.step2.totp.form.code</i18n>
                        </label>
                        <div class="d-flex justify-content-center gap-8">
                            <input type="text" id="otp-digit-0" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code" ng-model="ctrl.otpDigits[0]" ng-change="onDigitChange(0)" />
                            <input type="text" id="otp-digit-1" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" ng-model="ctrl.otpDigits[1]" ng-change="onDigitChange(1)" />
                            <input type="text" id="otp-digit-2" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" ng-model="ctrl.otpDigits[2]" ng-change="onDigitChange(2)" />
                            <input type="text" id="otp-digit-3" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" ng-model="ctrl.otpDigits[3]" ng-change="onDigitChange(3)" />
                            <input type="text" id="otp-digit-4" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" ng-model="ctrl.otpDigits[4]" ng-change="onDigitChange(4)" />
                            <input type="text" id="otp-digit-5" class="form-control text-center fw-bold" style="width:3rem;height:3.5rem;font-size:1.5rem;background-color:white;" maxlength="1" pattern="[0-9]" inputmode="numeric" ng-model="ctrl.otpDigits[5]" ng-change="onDigitChange(5)" />
                        </div>
                    </form>
                    <footer class="mt-8 mb-16">
                        <div ng-show="ctrl.status==='wait'" class="text-primary mb-12">
                            <div class="spinner-border text-primary" role="status">
                                <span class="sr-only">Loading...</span>
                            </div>
                        </div>
                        <div ng-if="ctrl.status==='ok'" class="text-success">
                            <svg class="icon-svg mx-auto" width="20" height="20">
                                <use href="/auth/public/icons/validate-icons.svg#successOutline"></use>
                            </svg>
                            <div>
                                <i18n>validate-mfa.success.paragraph1</i18n>
                            </div>
                            <div ng-if="ctrl.redirect">
                                <i18n>validate-mfa.success.paragraph2</i18n>
                            </div>
                            <div ng-if="!ctrl.fullscreen">
                                <i18n>validate-mfa.success.paragraph2.fullscreen</i18n>
                            </div>
                        </div>
                        <div ng-if="ctrl.status==='ko'" class="text-danger">
                            <svg class="icon-svg mx-auto" width="20" height="20">
                                <use href="/auth/public/icons/validate-icons.svg#error"></use>
                            </svg>
                            <div><span translate content="[[ctrl.koStatusCause]]"></span></div>
                        </div>
                    </footer>
                </div>

                <div class="text-center" ng-if="ctrl.status!=='ok' && !ctrl.isTotp">
                    <div class="mb-16">
                        <span>
                            <i18n>validate-mfa.step2.hint.paragraph4</i18n>
                        </span>
                    </div>

                    <div>
                        <button disabled type="button" id="btnRenew" class="btn btn-ghost-tertiary mx-auto fw-bold d-flex align-items-center" ng-click="onCodeRenew()">
                            <svg class="icon-svg me-4" width="20" height="20">
                                <use href="/auth/public/icons/validate-icons.svg#redo"></use>
                            </svg>
                            <i18n class="align-text-top">validate-mfa.step2.btn</i18n>
                        </button>
                    </div>
                </div>
            </div>
        </div>        
    </div>
</div>
